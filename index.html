<!DOCTYPE html>
<html lang="en">
<head>
    <title>Capture Reality | 3D Portfolio</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        :root { --primary: #007aff; --dark: #1a1a1a; --light: #f5f5f7; }
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--light); color: var(--dark); }
        
        /* Header */
        header { padding: 40px 20px; text-align: center; background: white; border-bottom: 1px solid #ddd; }
        header h1 { margin: 0; font-size: 2rem; letter-spacing: -1px; }
        header p { color: #666; margin-top: 10px; }

        /* Portfolio Grid */
        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        
        .card { 
            background: white; border-radius: 15px; overflow: hidden; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); cursor: pointer;
            transition: transform 0.3s ease;
        }
        .card:hover { transform: translateY(-10px); }
        .card-img { width: 100%; height: 200px; background: #eee; object-fit: cover; }
        .card-info { padding: 20px; }
        .card-info h3 { margin: 0; font-size: 1.1rem; }
        .card-info p { margin: 5px 0 0; font-size: 0.9rem; color: #888; }

        /* Fullscreen Viewer Overlay */
        #viewer-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 1000; display: none;
        }
        .close-btn {
            position: absolute; top: 20px; right: 20px; z-index: 1001;
            background: var(--dark); color: white; border: none; padding: 10px 20px;
            border-radius: 30px; cursor: pointer;
        }
        model-viewer { width: 100%; height: 100%; }

        /* Loading Spinner */
        #loading-ui {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; pointer-events: none;
        }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<header>
    <h1>Reality Capture Studio</h1>
    <p>High-Fidelity 3D Photogrammetry & AR Solutions</p>
</header>

<div class="container">
    <div class="grid">
        <div class="card" onclick="openViewer('1Zq08wMYhvIPcwHl2Ln43Hw5JysteHzyl', '1BBBr0R4gl83qguZqsqp2F3iwX18Syiqc', 'High-Res Food Scan')">
            <div class="card-img" style="background-image: url('thumb1.jpg'); background-size: cover;"></div>
            <div class="card-info">
                <h3>AR Menu Sample</h3>
                <p>Digital Twin • Food & Beverage</p>
            </div>
        </div>

        <div class="card" onclick="openViewer('YOUR_GLB_ID_2', 'YOUR_USDZ_ID_2', 'Mechanical Part')">
            <div class="card-img" style="background-image: url('thumb2.jpg'); background-size: cover;"></div>
            <div class="card-info">
                <h3>Mechanical Component</h3>
                <p>Industrial Scan • Aviation</p>
            </div>
        </div>
    </div>
</div>

<div id="viewer-overlay">
    <button class="close-btn" onclick="closeViewer()">✕ Close</button>
    
    <div id="loading-ui">
        <div class="spinner"></div>
        <p>Loading High-Res Data...</p>
    </div>

    <model-viewer id="main-viewer"
        ar ar-modes="webxr scene-viewer quick-look" 
        camera-controls shadow-intensity="1" auto-rotate>
        <button slot="ar-button" style="background: black; border-radius: 50px; color: white; border: none; padding: 15px 30px; position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);">
            VIEW IN AR
        </button>
    </model-viewer>
</div>

<script>
    const overlay = document.getElementById('viewer-overlay');
    const viewer = document.getElementById('main-viewer');
    const loader = document.getElementById('loading-ui');
    
    // REPLACE this with your actual Cloudflare Worker URL
    const proxyBase = "https://drive-proxy.mukudzeimorton.workers.dev/?id=";
    
    function openViewer(glbID, usdzID, title) {
        // 1. Show the fullscreen overlay and the spinner
        overlay.style.display = 'block';
        loader.style.display = 'block';
        
        // 2. Update the Page Title (Optional: if you add a title element)
        console.log("Loading model: " + title);
    
        // 3. Inject the Proxy links into the viewer attributes
        // We use setAttribute to ensure the browser registers the change immediately
        viewer.setAttribute('src', proxyBase + "1Zq08wMYhvIPcwHl2Ln43Hw5JysteHzyl");
        viewer.setAttribute('ios-src', proxyBase + "1BBBr0R4gl83qguZqsqp2F3iwX18Syiqc");
    
        // 4. Listen for the 'load' event to hide the spinner
        viewer.addEventListener('load', () => {
            loader.style.display = 'none';
        }, { once: true }); // {once: true} prevents memory leaks
    
        // 5. Error handling (e.g. if the proxy is down)
        viewer.addEventListener('error', (err) => {
            console.error("3D model failed to fetch:", err);
            alert("The model is taking a while. Please check your connection.");
        }, { once: true });
    }
    
    function closeViewer() {
        overlay.style.display = 'none';
        
        // Crucial: Clear the sources so the phone stops downloading data in the background
        viewer.setAttribute('src', '');
        viewer.setAttribute('ios-src', '');
    }
</script>

</body>
</html>
