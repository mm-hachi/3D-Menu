<!DOCTYPE html>
<html lang="en">
<head>
    <title>3D High-Res Preview</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background-color: #f8f9fa; }
        model-viewer { width: 100%; height: 100vh; --poster-color: transparent; }
        .ar-button {
            background: #222; border-radius: 30px; border: none;
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            padding: 15px 30px; color: white; font-family: sans-serif; cursor: pointer;
        }
    </style>
</head>
<body>

    <model-viewer 
        src="https://drive.google.com/file/d/1Zq08wMYhvIPcwHl2Ln43Hw5JysteHzyl/view?usp=drive_link" 
        ios-src="https://drive.google.com/uc?export=download&id=1BBBr0R4gl83qguZqsqp2F3iwX18Syiqc"
        ar ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        shadow-intensity="1" 
        auto-rotate>
        <button slot="ar-button" class="ar-button">VIEW IN AR</button>
    </model-viewer>

</body>
</html>
