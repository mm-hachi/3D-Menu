<!DOCTYPE html>
<html lang="en">
<head>
    <title>3D Project Preview</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        :not(:defined) > * { display: none; }
        body { margin: 0; background-color: #f4f4f4; font-family: sans-serif; }
        model-viewer { width: 100vw; height: 100vh; background-color: #fff; }

        /* The Loading Bar Container */
        #progress-bar {
            width: 200px; height: 4px; background: rgba(0, 0, 0, 0.1);
            position: absolute; left: 50%; top: 50%;
            transform: translate(-50%, -50%); border-radius: 2px; overflow: hidden;
        }

        /* The Actual Moving Bar */
        #update-bar {
            width: 0%; height: 100%; background-color: #007bff;
            transition: width 0.3s;
        }

        .ar-button {
            background-color: #000; border-radius: 8px; border: none;
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
            padding: 14px 28px; color: white; font-weight: bold; cursor: pointer;
        }

        #instructions {
            position: absolute; top: 20px; width: 100%; text-align: center;
            color: #666; font-size: 14px; pointer-events: none;
        }
    </style>
</head>
<body>

    <model-viewer 
        id="model-load"
        src="https://drive-proxy.mukudzeimorton.workers.dev/?id=1Zq08wMYhvIPcwHl2Ln43Hw5JysteHzyl" 
        ios-src="https://drive-proxy.mukudzeimorton.workers.dev/?id=1BBBr0R4gl83qguZqsqp2F3iwX18Syiqc"
        ar ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        shadow-intensity="1">
        
        <div id="progress-bar" slot="progress-bar">
            <div id="update-bar"></div>
        </div>

        <button slot="ar-button" class="ar-button">
            👋 VIEW IN YOUR SPACE
        </button>

        <div id="instructions">
            Drag to rotate • Pinch to zoom
        </div>

    </model-viewer>

    <script>
        // This script updates the loading bar based on download progress
        const modelViewer = document.querySelector('#model-load');
        const progressBar = document.querySelector('#update-bar');

        modelViewer.addEventListener('progress', (event) => {
            const {totalProgress} = event.detail;
            progressBar.style.width = `${totalProgress * 100}%`;
            if (totalProgress === 1) {
                document.querySelector('#progress-bar').style.display = 'none';
            }
        });
    </script>

</body>
</html>
