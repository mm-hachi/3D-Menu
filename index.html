<!DOCTYPE html>
<html lang="en">
<head>
    <title>3D Project Preview</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background-color: #ffffff; font-family: sans-serif; }
        model-viewer { width: 100vw; height: 100vh; }

        /* The Loading Overlay */
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100;
        }

        /* A spinning circle that always works */
        .spinner {
            width: 50px; height: 50px;
            border: 5px solid #f3f3f3; border-top: 5px solid #007bff;
            border-radius: 50%; animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text { margin-top: 20px; color: #555; font-weight: bold; }

        .ar-button {
            background-color: #000; border-radius: 8px; border: none;
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
            padding: 14px 28px; color: white; font-weight: bold; cursor: pointer;
            z-index: 10;
        }

        /* Hide the model until it is loaded */
        model-viewer:not(.ready) { visibility: hidden; }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <p class="loading-text">Optimizing 3D Model...</p>
    </div>

    <model-viewer 
        id="model-viewer"
        src="https://drive-proxy.mukudzeimorton.workers.dev/?id=1Zq08wMYhvIPcwHl2Ln43Hw5JysteHzyl" 
        ios-src="https://drive-proxy.mukudzeimorton.workers.dev/?id=1BBBr0R4gl83qguZqsqp2F3iwX18Syiqc"
        ar ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        shadow-intensity="1">
        
        <button slot="ar-button" class="ar-button">
            👋 VIEW IN YOUR SPACE
        </button>

    </model-viewer>

    <script>
        const modelViewer = document.querySelector('#model-viewer');
        const loader = document.querySelector('#loading-overlay');

        // When the model is fully loaded and rendered
        modelViewer.addEventListener('load', () => {
            loader.style.display = 'none'; // Hide the spinner
            modelViewer.classList.add('ready'); // Show the model
        });

        // Error handling if the proxy fails
        modelViewer.addEventListener('error', (error) => {
            console.error("Model failed to load:", error);
            document.querySelector('.loading-text').innerText = "Error loading model. Check connection.";
        });
    </script>

</body>
</html>
